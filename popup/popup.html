<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>フリマ会計CSV</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- ヘッダー -->
    <header class="header">
      <h1 class="title">フリマ会計CSV</h1>
      <button id="settings-btn" class="icon-btn" title="設定を開く">⚙</button>
    </header>

    <!-- 会計ソフト切り替え -->
    <div class="saas-row">
      <button class="saas-btn" data-saas="freee">freee</button>
      <button class="saas-btn" data-saas="moneyforward">マネーフォワード</button>
    </div>

    <!-- 年選択 + 読み込みボタン -->
    <div class="fetch-row">
      <select id="year-select" class="year-select"></select>
      <button id="fetch-btn" class="primary-btn">読み込む</button>
    </div>

    <!-- ステータス表示 -->
    <div id="status" class="status hidden"></div>

    <!-- 月フィルター -->
    <div id="filter-section" class="hidden">
      <div class="month-filter">
        <button class="month-btn active" data-month="all">全</button>
        <button class="month-btn" data-month="1">1月</button>
        <button class="month-btn" data-month="2">2月</button>
        <button class="month-btn" data-month="3">3月</button>
        <button class="month-btn" data-month="4">4月</button>
        <button class="month-btn" data-month="5">5月</button>
        <button class="month-btn" data-month="6">6月</button>
        <button class="month-btn" data-month="7">7月</button>
        <button class="month-btn" data-month="8">8月</button>
        <button class="month-btn" data-month="9">9月</button>
        <button class="month-btn" data-month="10">10月</button>
        <button class="month-btn" data-month="11">11月</button>
        <button class="month-btn" data-month="12">12月</button>
      </div>
    </div>

    <!-- 取引一覧 -->
    <div id="list-section" class="hidden">
      <div class="list-controls">
        <span id="selected-count" class="selected-count">0件選択中</span>
        <div class="list-btns">
          <button id="select-all-btn" class="text-btn">全選択</button>
          <button id="deselect-all-btn" class="text-btn">全解除</button>
        </div>
      </div>
      <div id="transaction-list" class="transaction-list"></div>
    </div>

    <!-- エクスポートボタン -->
    <div id="export-section" class="hidden">
      <button id="export-btn" class="export-btn">CSV エクスポート</button>
    </div>

  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
